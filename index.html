<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1115" />

    <!-- Apply the saved/system theme before paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          var dark =
            stored === 'dark' ||
            (stored !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {}
      })()
    </script>

    <title>Unfollowers Checker — Find who doesn't follow you back</title>
    <meta
      name="description"
      content="Find out who you follow that doesn't follow you back — across the platforms you use."
    />
    <link rel="canonical" href="https://unfollowerschecker.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://unfollowerschecker.com/" />
    <meta
      property="og:title"
      content="Unfollowers Checker"
    />
    <meta
      property="og:description"
      content="Find out who you follow that doesn't follow you back — across the platforms you use."
    />
    <meta property="og:image" content="https://unfollowerschecker.com/og.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Unfollowers Checker" />
    <meta
      name="twitter:description"
      content="Find out who you follow that doesn't follow you back — across the platforms you use."
    />
    <meta name="twitter:image" content="https://unfollowerschecker.com/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
